<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Status</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        
        .main-text {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
        }
        
        .log-message {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #333;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="main-text">Hell nah we are in school</div>
    <div class="log-message" id="logMessage"></div>
    
    <script>
        function generateTimestamp() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                timeZoneName: 'short'
            };
            const timeString = now.toLocaleString('en-US', options);
            document.getElementById('logMessage').textContent = `[INFO] ${timeString} - Access attempt logged to /Internal/Logs.txt`;
        }
        
        generateTimestamp();
    </script>
</body>
</html>
