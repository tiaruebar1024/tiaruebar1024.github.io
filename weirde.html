<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Status</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        
        .main-text {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .log-message {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #aaa;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="main-text">Hell nah we are in school</div>
    <div class="log-message">[INFO] Thursday, January 08, 2026, 7:02 AM CET - Access attempt logged to /Internal/Logs.txt</div>
</body>
</html>
